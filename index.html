<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café Menú</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <span class="brand">BLANC CAFÉ</span>
  <h1 id="greeting">Buenos días</h1>

  <input type="text" id="search" placeholder="Buscar en el menú...">

  <div class="filters">
    <button class="filter active" data-category="all">Todo</button>
    <button class="filter" data-category="cafe">Café</button>
    <button class="filter" data-category="matcha">Matcha</button>
    <button class="filter" data-category="food">Food</button>
  </div>
</header>

<main id="menu">

  <div class="item" data-category="cafe">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" alt="Flat white">
    <div class="info">
      <h3>Flat white</h3>
      <p>Espresso doble, leche vaporizada, microespuma perfecta</p>
      <span>$75</span>
    </div>
  </div>

  <div class="item" data-category="matcha">
    <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c" alt="Matcha latte">
    <div class="info">
      <h3>Matcha latte</h3>
      <p>Matcha ceremonial japonés, leche de avena, sin azúcar</p>
      <span>$90</span>
    </div>
  </div>

  <div class="item" data-category="food">
    <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec" alt="Croissant">
    <div class="info">
      <h3>Croissant de almendra</h3>
      <p>Masa hojaldrada francesa, crema de almendra, azúcar glass</p>
      <span>$65</span>
    </div>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
